<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        background: #000;
      }
      iframe {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
      }
    </style>
  </head>
  <body>
    <iframe
      id="player"
      allow="
        accelerometer;
        autoplay;
        clipboard-write;
        encrypted-media;
        gyroscope;
        picture-in-picture;
        fullscreen;
      "
      allowfullscreen
      referrerpolicy="strict-origin-when-cross-origin"
    >
    </iframe>
    <script>
      const v = new URL(location.href).searchParams.get("v");
      if (v)
        document.getElementById("player").src =
           `https://www.youtube-nocookie.com/embed/${v}?autoplay=1&mute=1&rel=0`;
      else document.body.textContent = "missing ?v=";
    </script>
  </body>
</html>
